name: Generate Runtime Reports

on:
  schedule:
    - cron: '0 */4 * * *'  # every 4 hours
  workflow_dispatch: {}

permissions:
  contents: write
  models: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dashboard repo
        uses: actions/checkout@v4

      - name: Fetch triage script
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fetch from fork branch (change to dotnet/runtime main after PR #125005 merges)
          gh api -H "Accept: application/vnd.github.raw" \
            "repos/danmoseley/runtime/contents/.github/skills/pr-triage/scripts/Get-PrTriageData.ps1?ref=pr-triage-skill" \
            > Get-PrTriageData.ps1

      - name: Install gh-models extension
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh extension install github/gh-models

      - name: Run full PR scan
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pwsh ./Get-PrTriageData.ps1 -Repo dotnet/runtime -Limit 500 > full-scan.json

      - name: Generate HTML reports
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pwsh ./scripts/Build-Reports.ps1 -ScanFile full-scan.json -Repo dotnet/runtime -Slug runtime

      - name: Generate index page
        run: pwsh ./scripts/Build-Index.ps1

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            # Pull any concurrent changes (e.g., from the other workflow)
            git pull --rebase origin main || true
            git commit -m "Update runtime reports $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
