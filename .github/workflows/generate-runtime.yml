name: Generate Runtime Reports

on:
  schedule:
    - cron: '0 */4 * * *'  # every 4 hours
  workflow_dispatch: {}

permissions:
  contents: write
  models: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dashboard repo
        uses: actions/checkout@v4

      - name: Install gh-models extension
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh extension install github/gh-models

      - name: Run full PR scan
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p docs/runtime
          pwsh ./scripts/Get-PrTriageData.ps1 -Repo dotnet/runtime -Limit 500 > docs/runtime/scan.json

      - name: Generate HTML reports
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pwsh ./scripts/Build-Reports.ps1 -ScanFile docs/runtime/scan.json -Repo dotnet/runtime -Slug runtime -ScheduleHours 4

      - name: Generate index page
        run: pwsh ./scripts/Build-Index.ps1

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            git stash --include-untracked || true
            git pull origin main || true
            git stash pop || true
            pwsh ./scripts/Build-Index.ps1
            git add docs/
            if git diff --cached --quiet; then
              echo "No changes to commit"
              break
            fi
            git commit -m "Update runtime reports $(date -u +'%Y-%m-%d %H:%M UTC')"
            if git push; then
              break
            fi
            echo "Push failed (attempt $attempt), retrying..."
            git reset HEAD~1
            sleep 5
          done
