name: Generate All Reports

on:
  schedule:
    - cron: '0 */4 * * *'  # every 4 hours
  workflow_dispatch: {}

permissions:
  contents: write
  models: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dashboard repo
        uses: actions/checkout@v4

      - name: Install gh-models extension
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh extension install github/gh-models

      - name: Scan and generate reports
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # repo:slug:ai (ai = 1 for AI observations, 0 to skip)
          repos=(
            "dotnet/runtime:runtime:1"
            "dotnet/aspnetcore:aspnetcore:1"
            "dotnet/aspire:aspire:1"
            "dotnet/extensions:extensions:1"
            "dotnet/sdk:sdk:0"
            "dotnet/msbuild:msbuild:0"
            "dotnet/winforms:winforms:0"
            "dotnet/wpf:wpf:0"
            "dotnet/roslyn:roslyn:0"
          )
          for entry in "${repos[@]}"; do
            IFS=':' read -r repo slug use_ai <<< "$entry"
            echo "=== Scanning $repo ==="
            mkdir -p "docs/${slug}"
            # Read maintainers for this repo from config
            maintainers=$(pwsh -Command "(Get-Content config/maintainers.json | ConvertFrom-Json).'$repo' -join ','")
            maintainer_args=""
            if [ -n "$maintainers" ]; then
              maintainer_args="-Maintainers $maintainers"
            fi
            pwsh ./scripts/Get-PrTriageData.ps1 -Repo "$repo" -Limit 500 $maintainer_args > "docs/${slug}/scan.json"
            skip_ai_flag=""
            if [ "$use_ai" = "0" ]; then
              skip_ai_flag="-SkipAI"
            fi
            pwsh ./scripts/Build-Reports.ps1 -ScanFile "docs/${slug}/scan.json" -Repo "$repo" -Slug "$slug" -ScheduleHours 4 $skip_ai_flag
          done

      - name: Generate index page
        run: pwsh ./scripts/Build-Index.ps1

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            git stash --include-untracked || true
            git pull origin main || true
            git stash pop || true
            pwsh ./scripts/Build-Index.ps1
            git add docs/
            if git diff --cached --quiet; then
              echo "No changes to commit"
              break
            fi
            git commit -m "Update reports $(date -u +'%Y-%m-%d %H:%M UTC')"
            if git push; then
              break
            fi
            echo "Push failed (attempt $attempt), retrying..."
            git reset HEAD~1
            sleep 5
          done
