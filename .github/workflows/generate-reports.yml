name: Generate All Reports

on:
  # schedule-desc: priority repos ~4x daily, others ~daily
  schedule:
    - cron: '11 0,6,12,18 * * 1-5'  # weekdays 4x: priority repos every 6h at :11 past, standard repos at 6:11 UTC only (off-minute to reduce GitHub delays)
    - cron: '11 6,18 * * 0,6'       # weekends 2x: priority repos both, standard repos at 6:11 UTC only
  workflow_dispatch: {}

concurrency:
  group: generate-reports
  cancel-in-progress: false  # let the running job finish; new run will queue

permissions:
  contents: write
  models: read
  actions: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Skip if recent run
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Skip this scheduled run if a manual run completed successfully in the last 4 hours
          # Non-fatal: if the API call fails, proceed with the run anyway
          cutoff=$(date -u -d '4 hours ago' '+%Y-%m-%dT%H:%M:%SZ')
          recent=$(gh api "repos/${{ github.repository }}/actions/workflows/generate-reports.yml/runs?branch=main&event=workflow_dispatch&status=completed&per_page=20" \
            --jq '[.workflow_runs[] | select(.conclusion == "success")][0].updated_at // empty' 2>/dev/null || true)
          if [ -n "$recent" ] && [[ "$recent" > "$cutoff" ]]; then
            echo "Skipping: recent manual run completed at $recent (cutoff: $cutoff)"
            echo "SKIP_RUN=true" >> "$GITHUB_ENV"
          fi
      - name: Checkout dashboard repo
        if: env.SKIP_RUN != 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history needed for changelog generation

      - name: Read schedule description
        if: env.SKIP_RUN != 'true'
        run: |
          # Per-tier schedule descriptions
          echo "PRIORITY_SCHEDULE_DESC=~4x daily" >> "$GITHUB_ENV"
          echo "STANDARD_SCHEDULE_DESC=~daily" >> "$GITHUB_ENV"
          # Determine if this is a daily slot where standard repos should also refresh.
          # Standard repos run at the 06 UTC slot. We check the runtime clock with a
          # ±1h tolerance (05-07 UTC) to handle GitHub Actions queuing delays.
          current_hour=$(date -u +%H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$current_hour" = "05" ] || [ "$current_hour" = "06" ] || [ "$current_hour" = "07" ]; then
            echo "RUN_STANDARD=true" >> "$GITHUB_ENV"
            echo "Running all tiers (daily slot or manual trigger)"
          else
            echo "RUN_STANDARD=false" >> "$GITHUB_ENV"
            echo "Running priority tier only (hour=$current_hour)"
          fi

      - name: Install gh-models extension
        if: env.SKIP_RUN != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh extension install github/gh-models

      - name: Scan and generate reports
        if: env.SKIP_RUN != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          failed=()
          repos=(
            "dotnet/runtime:runtime:priority"
            "dotnet/aspnetcore:aspnetcore:standard"
            "microsoft/aspire:aspire:priority"
            "dotnet/extensions:extensions:standard"
            "dotnet/sdk:sdk:standard"
            "dotnet/msbuild:msbuild:standard"
            "dotnet/winforms:winforms:standard"
            "dotnet/wpf:wpf:standard"
            "dotnet/roslyn:roslyn:standard"
            "dotnet/machinelearning:machinelearning:standard"
            "dotnet/skills:skills:standard"
            "dotnet/maui:maui:standard"
          )
          for entry in "${repos[@]}"; do
            IFS=':' read -r repo slug tier <<< "$entry"

            # Skip standard-tier repos unless this is the daily slot or manual trigger
            if [ "$tier" = "standard" ] && [ "$RUN_STANDARD" != "true" ]; then
              echo "--- Skipping $repo (standard tier, not daily slot) ---"
              continue
            fi

            # Set per-repo schedule description based on tier
            if [ "$tier" = "priority" ]; then
              schedule_desc="$PRIORITY_SCHEDULE_DESC"
            else
              schedule_desc="$STANDARD_SCHEDULE_DESC"
            fi

            echo "=== Scanning $repo ($tier tier) ==="
            mkdir -p "docs/${slug}"
            # Read maintainers for this repo from config
            maintainers=$(pwsh -Command "(Get-Content config/maintainers.json | ConvertFrom-Json).'$repo' -join ','")
            maintainer_args=""
            if [ -n "$maintainers" ]; then
              maintainer_args="-Maintainers $maintainers"
            fi
            # Write scan to temp file; only overwrite scan.json if valid JSON
            scan_ok=true
            if ! pwsh ./scripts/Get-PrTriageData.ps1 -Repo "$repo" -Limit 500 $maintainer_args > "docs/${slug}/scan.json.tmp"; then
              echo "::warning::Scan failed for $repo"
              scan_ok=false
            fi
            # Validate the output is parseable JSON with a prs array
            if $scan_ok && pwsh -Command "(\$j = Get-Content 'docs/${slug}/scan.json.tmp' -Raw | ConvertFrom-Json) -and \$j.prs -ne \$null" > /dev/null 2>&1; then
              mv "docs/${slug}/scan.json.tmp" "docs/${slug}/scan.json"
            else
              echo "::warning::Invalid or empty scan output for $repo — keeping previous data"
              rm -f "docs/${slug}/scan.json.tmp"
              if [ ! -f "docs/${slug}/scan.json" ]; then
                echo "::warning::No previous scan.json for $repo — skipping reports"
                failed+=("$repo")
                continue
              fi
            fi
            if ! pwsh ./scripts/Build-Reports.ps1 -ScanFile "docs/${slug}/scan.json" -Repo "$repo" -Slug "$slug" -ScheduleDesc "$schedule_desc" -SkipAI; then
              echo "::warning::Report generation failed for $repo"
              failed+=("$repo")
              continue
            fi
          done
          if [ ${#failed[@]} -gt 0 ]; then
            echo "::warning::Failed repos: ${failed[*]}"
            echo "FAILED_REPOS=${failed[*]}" >> "$GITHUB_ENV"
          fi

      - name: Generate index page
        if: env.SKIP_RUN != 'true'
        run: |
          mkdir -p docs/all
          pwsh ./scripts/Build-Index.ps1

      - name: Commit and push
        if: env.SKIP_RUN != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            git stash --include-untracked || true
            git pull origin main || true
            git stash pop || true
            pwsh ./scripts/Build-Index.ps1
            pwsh ./scripts/Build-Changelog.ps1 || echo "::warning::Changelog generation failed, continuing without update"
            git add docs/
            if git diff --cached --quiet; then
              echo "No changes to commit"
              break
            fi
            git commit -m "Update reports $(TZ='America/Los_Angeles' date +'%Y-%m-%d %H:%M %Z')"
            if git push; then
              break
            fi
            echo "Push failed (attempt $attempt), retrying..."
            git reset HEAD~1
            sleep 5
          done

      - name: Report failures
        if: env.SKIP_RUN != 'true' && env.FAILED_REPOS != ''
        run: |
          echo "::error::The following repos had scan/report failures: $FAILED_REPOS"
          exit 1
