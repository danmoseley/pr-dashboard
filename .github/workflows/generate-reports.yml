name: Generate All Reports

on:
  schedule:
    - cron: '0 */12 * * *'  # every 12 hours
  workflow_dispatch: {}

permissions:
  contents: write
  models: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dashboard repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history needed for changelog generation

      - name: Install gh-models extension
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh extension install github/gh-models

      - name: Scan and generate reports
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          failed=()
          repos=(
            "dotnet/runtime:runtime"
            "dotnet/aspnetcore:aspnetcore"
            "dotnet/aspire:aspire"
            "dotnet/extensions:extensions"
            "dotnet/sdk:sdk"
            "dotnet/msbuild:msbuild"
            "dotnet/winforms:winforms"
            "dotnet/wpf:wpf"
            "dotnet/roslyn:roslyn"
            "dotnet/machinelearning:machinelearning"
            "dotnet/skills:skills"
            "dotnet/maui:maui"
          )
          for entry in "${repos[@]}"; do
            IFS=':' read -r repo slug <<< "$entry"
            echo "=== Scanning $repo ==="
            mkdir -p "docs/${slug}"
            # Read maintainers for this repo from config
            maintainers=$(pwsh -Command "(Get-Content config/maintainers.json | ConvertFrom-Json).'$repo' -join ','")
            maintainer_args=""
            if [ -n "$maintainers" ]; then
              maintainer_args="-Maintainers $maintainers"
            fi
            # Write scan to temp file; only overwrite scan.json if valid JSON
            scan_ok=true
            if ! pwsh ./scripts/Get-PrTriageData.ps1 -Repo "$repo" -Limit 500 $maintainer_args > "docs/${slug}/scan.json.tmp"; then
              echo "::warning::Scan failed for $repo"
              scan_ok=false
            fi
            # Validate the output is parseable JSON with a prs array
            if $scan_ok && pwsh -Command "(\$j = Get-Content 'docs/${slug}/scan.json.tmp' -Raw | ConvertFrom-Json) -and \$j.prs -ne \$null" > /dev/null 2>&1; then
              mv "docs/${slug}/scan.json.tmp" "docs/${slug}/scan.json"
            else
              echo "::warning::Invalid or empty scan output for $repo — keeping previous data"
              rm -f "docs/${slug}/scan.json.tmp"
              if [ ! -f "docs/${slug}/scan.json" ]; then
                echo "::warning::No previous scan.json for $repo — skipping reports"
                failed+=("$repo")
                continue
              fi
            fi
            if ! pwsh ./scripts/Build-Reports.ps1 -ScanFile "docs/${slug}/scan.json" -Repo "$repo" -Slug "$slug" -ScheduleHours 12 -SkipAI; then
              echo "::warning::Report generation failed for $repo"
              failed+=("$repo")
              continue
            fi
          done
          if [ ${#failed[@]} -gt 0 ]; then
            echo "::warning::Failed repos: ${failed[*]}"
            echo "FAILED_REPOS=${failed[*]}" >> "$GITHUB_ENV"
          fi

      - name: Generate index page
        run: |
          mkdir -p docs/all
          pwsh ./scripts/Build-Index.ps1 -ScheduleHours 12

      - name: Commit and push
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            git stash --include-untracked || true
            git pull origin main || true
            git stash pop || true
            pwsh ./scripts/Build-Index.ps1 -ScheduleHours 12
            pwsh ./scripts/Build-Changelog.ps1 || echo "::warning::Changelog generation failed, continuing without update"
            git add docs/
            if git diff --cached --quiet; then
              echo "No changes to commit"
              break
            fi
            git commit -m "Update reports $(date -u +'%Y-%m-%d %H:%M UTC')"
            if git push; then
              break
            fi
            echo "Push failed (attempt $attempt), retrying..."
            git reset HEAD~1
            sleep 5
          done

      - name: Report failures
        if: env.FAILED_REPOS != ''
        run: |
          echo "::error::The following repos had scan/report failures: $FAILED_REPOS"
          exit 1
