name: Generate Other Repo Reports

on:
  schedule:
    - cron: '0 */12 * * *'  # every 12 hours
  workflow_dispatch: {}

permissions:
  contents: write
  models: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dashboard repo
        uses: actions/checkout@v4

      - name: Fetch triage script
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api -H "Accept: application/vnd.github.raw" \
            "repos/danmoseley/runtime/contents/.github/skills/pr-triage/scripts/Get-PrTriageData.ps1?ref=pr-triage-skill" \
            > Get-PrTriageData.ps1

      - name: Install gh-models extension
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh extension install github/gh-models

      - name: Scan and generate reports
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          repos=("dotnet/aspnetcore:aspnetcore" "dotnet/sdk:sdk" "dotnet/msbuild:msbuild" "dotnet/winforms:winforms" "dotnet/wpf:wpf" "dotnet/roslyn:roslyn" "dotnet/aspire:aspire")
          for entry in "${repos[@]}"; do
            IFS=':' read -r repo slug <<< "$entry"
            echo "=== Scanning $repo ==="
            pwsh ./Get-PrTriageData.ps1 -Repo "$repo" -Limit 500 > "scan-${slug}.json"
            pwsh ./scripts/Build-Reports.ps1 -ScanFile "scan-${slug}.json" -Repo "$repo" -Slug "$slug" -ReportTypes top15,quick-wins
          done

      - name: Generate index page
        run: pwsh ./scripts/Build-Index.ps1

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update other repo reports $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main || true
            git push
          fi
