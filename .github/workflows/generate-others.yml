name: Generate Other Repo Reports

on:
  schedule:
    - cron: '0 */12 * * *'  # every 12 hours
  workflow_dispatch: {}

permissions:
  contents: write
  models: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dashboard repo
        uses: actions/checkout@v4

      - name: Install gh-models extension
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh extension install github/gh-models

      - name: Scan and generate reports
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          repos=("dotnet/aspnetcore:aspnetcore" "dotnet/sdk:sdk" "dotnet/msbuild:msbuild" "dotnet/winforms:winforms" "dotnet/wpf:wpf" "dotnet/roslyn:roslyn" "dotnet/aspire:aspire" "dotnet/extensions:extensions")
          for entry in "${repos[@]}"; do
            IFS=':' read -r repo slug <<< "$entry"
            echo "=== Scanning $repo ==="
            mkdir -p "docs/${slug}"
            # Read maintainers for this repo from config
            maintainers=$(pwsh -Command "(Get-Content config/maintainers.json | ConvertFrom-Json).'$repo' -join ','")
            maintainer_args=""
            if [ -n "$maintainers" ]; then
              maintainer_args="-Maintainers $maintainers"
            fi
            pwsh ./scripts/Get-PrTriageData.ps1 -Repo "$repo" -Limit 500 $maintainer_args > "docs/${slug}/scan.json"
            pwsh ./scripts/Build-Reports.ps1 -ScanFile "docs/${slug}/scan.json" -Repo "$repo" -Slug "$slug" -ReportTypes top15,community,quick-wins,stale-close -ScheduleHours 12
          done

      - name: Generate index page
        run: pwsh ./scripts/Build-Index.ps1

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Retry loop to handle concurrent pushes from the other workflow
          for attempt in 1 2 3; do
            # Pull latest (may include runtime workflow's push)
            git stash --include-untracked || true
            git pull origin main || true
            git stash pop || true
            # Regenerate index with all available meta.json files
            pwsh ./scripts/Build-Index.ps1
            git add docs/
            if git diff --cached --quiet; then
              echo "No changes to commit"
              break
            fi
            git commit -m "Update other repo reports $(date -u +'%Y-%m-%d %H:%M UTC')"
            if git push; then
              break
            fi
            echo "Push failed (attempt $attempt), retrying..."
            git reset HEAD~1
            sleep 5
          done
